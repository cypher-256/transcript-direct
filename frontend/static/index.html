<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transcript Direct</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Local whisper</p>
          <h1>Transcript Direct</h1>
        </div>
        <div class="health-pill" id="healthPill">Backend</div>
      </header>

      <section class="control-panel" aria-label="Transcription controls">
        <label class="field">
          <span>Model</span>
          <select id="modelSelect"></select>
        </label>

        <label class="field checkbox-field">
          <span>Microphone</span>
          <span class="checkbox-control">
            <input id="includeMicCheckbox" type="checkbox" />
            <span>Include browser microphone</span>
          </span>
        </label>

        <label class="field compact">
          <span>Max phrase</span>
          <select id="chunkSelect">
            <option value="1.5">1.5 s</option>
            <option value="2">2 s</option>
            <option value="3" selected>3 s</option>
          </select>
        </label>

        <label class="field compact">
          <span>Language</span>
          <select id="languageSelect">
            <option value="en" selected>English</option>
            <option value="es">Spanish</option>
          </select>
        </label>

        <div class="actions" role="group" aria-label="Actions">
          <button class="primary-button" id="startButton" type="button">
            <span class="button-icon" aria-hidden="true"></span>
            <span>Transcribe</span>
          </button>
          <button class="secondary-button" id="stopButton" type="button" disabled>
            Stop
          </button>
          <button class="secondary-button" id="clearButton" type="button">
            Clear
          </button>
        </div>
      </section>

      <section class="status-strip" aria-live="polite">
        <div>
          <span class="status-label">State</span>
          <strong id="statusText">Ready</strong>
        </div>
        <div>
          <span class="status-label">Time</span>
          <strong id="timerText">00:00</strong>
        </div>
        <div>
          <span class="status-label">Phrases</span>
          <strong id="chunkText">0</strong>
        </div>
      </section>

      <section class="transcript-layout">
        <article class="transcript-card">
          <div class="section-header">
            <div>
              <p class="eyebrow">Live output</p>
              <h2>Transcription</h2>
            </div>
            <button class="copy-button" id="copyButton" type="button">Copy</button>
          </div>
          <div class="live-transcript" id="transcriptOutput">
            <p class="placeholder">Press Transcribe and share tab audio. Text will appear word by word.</p>
          </div>
        </article>
      </section>
    </main>

    <script type="module" src="/app.js?v=20260529-english-ui-1"></script>
  </body>
</html>
